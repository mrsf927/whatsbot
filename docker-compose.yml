version: "3.8"

services:
  whatsbot:
    build: .
    container_name: whatsbot
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - whatsbot-storages:/app/storages
      - whatsbot-statics:/app/statics
      - whatsbot-logs:/app/logs
    environment:
      - WHATSBOT_DOCKER=1
      - WHATSBOT_WEB_PORT=${WHATSBOT_WEB_PORT:-8080}
      - WHATSBOT_GOWA_PORT=${WHATSBOT_GOWA_PORT:-64999}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - WHATSBOT_MODEL=${WHATSBOT_MODEL:-openai/gpt-4o-mini}
      - WHATSBOT_SYSTEM_PROMPT=${WHATSBOT_SYSTEM_PROMPT:-}
      - WHATSBOT_AUTO_REPLY=${WHATSBOT_AUTO_REPLY:-false}
      - WHATSBOT_MAX_CONTEXT=${WHATSBOT_MAX_CONTEXT:-10}
      - WHATSBOT_BATCH_DELAY=${WHATSBOT_BATCH_DELAY:-3.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

volumes:
  whatsbot-storages:
  whatsbot-statics:
  whatsbot-logs:
